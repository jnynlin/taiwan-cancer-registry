<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Study Flow — Cancer Research Pipeline 2026</title>
<style>
:root {
  --bg:        #080d17;
  --bg2:       #0f172a;
  --bg3:       #1e293b;
  --border:    #1e3050;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --accent:    #38bdf8;

  --c-ready:      #16a34a;
  --c-ready-glow: #22c55e;
  --c-ready-dim:  #052e16;
  --c-issues:     #ca8a04;
  --c-issues-glow:#fbbf24;
  --c-issues-dim: #292103;
  --c-rerun:      #2563eb;
  --c-rerun-glow: #60a5fa;
  --c-rerun-dim:  #0d1f4a;
  --c-undecided:  #7c3aed;
  --c-undecided-glow:#a78bfa;
  --c-undecided-dim: #1a0c38;
  --c-closed:     #374151;
  --c-closed-glow:#6b7280;
  --c-closed-dim: #111827;
  --c-future:     #0e7490;
  --c-future-glow:#22d3ee;
  --c-future-dim: #042f3d;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;overflow-x:hidden}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
#hdr{
  padding:20px 36px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-end;gap:32px;flex-wrap:wrap;
  background:linear-gradient(180deg,#0d1730 0%,var(--bg) 100%);
}
#hdr h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:#f1f5f9}
#hdr small{font-size:12px;color:var(--muted);display:block;margin-top:2px}
.chips{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;align-items:center}
.chip{
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  cursor:pointer;border:1px solid transparent;white-space:nowrap;
  transition:all .15s;user-select:none
}
.chip-ready    {background:var(--c-ready-dim);   color:var(--c-ready-glow);  border-color:#145a2a}
.chip-issues   {background:var(--c-issues-dim);  color:var(--c-issues-glow); border-color:#5a3b01}
.chip-rerun    {background:var(--c-rerun-dim);   color:var(--c-rerun-glow);  border-color:#153570}
.chip-undecided{background:var(--c-undecided-dim);color:var(--c-undecided-glow);border-color:#3b1a7a}
.chip-closed   {background:var(--c-closed-dim);  color:var(--c-closed-glow); border-color:#2d3748}

/* ── FILTER BAR ────────────────────────────────────────────────────────── */
#fbar{
  padding:10px 36px;border-bottom:1px solid var(--border);
  display:flex;gap:6px;overflow-x:auto;background:var(--bg2)
}
.fb{
  padding:5px 13px;border-radius:5px;font-size:12px;font-weight:500;
  cursor:pointer;border:1px solid var(--border);background:transparent;
  color:var(--muted);transition:all .15s;white-space:nowrap
}
.fb:hover{color:var(--text);border-color:#334155}
.fb.on{color:#f1f5f9;border-color:#475569;background:var(--bg3)}

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
#wrap{display:flex;height:calc(100vh - 108px);overflow:hidden}
#canvas-wrap{flex:1;overflow:auto;padding:24px 36px 24px 24px}
#svg-main{display:block;width:100%;min-width:1100px}

/* ── DETAIL PANEL ───────────────────────────────────────────────────────── */
#dpanel{
  width:0;min-width:0;overflow:hidden;
  border-left:1px solid var(--border);background:var(--bg2);
  transition:width .28s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;display:flex;flex-direction:column
}
#dpanel.open{width:350px;min-width:350px}
#dpanel-inner{width:350px;padding:20px 22px;overflow-y:auto;flex:1}

.dp-close{
  float:right;cursor:pointer;color:var(--muted);font-size:18px;
  line-height:1;padding:2px 4px;border-radius:4px;
  transition:color .15s
}
.dp-close:hover{color:var(--text)}
.dp-badge{
  display:inline-block;padding:2px 9px;border-radius:10px;
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
  margin-bottom:10px
}
.dp-title{font-size:17px;font-weight:700;line-height:1.3;margin-bottom:3px;color:#f1f5f9}
.dp-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.dp-section{margin-bottom:14px}
.dp-slabel{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin-bottom:7px
}
.dp-journal{
  background:var(--bg3);border:1px solid var(--border);border-radius:6px;
  padding:9px 12px;font-size:12px;line-height:1.5;color:#cbd5e1
}
.dp-journal strong{display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:.6px;color:var(--muted);margin-bottom:4px}
.plist{list-style:none}
.plist li{
  font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:7px;line-height:1.45;color:#cbd5e1
}
.plist li:last-child{border-bottom:none}
.pnum{
  width:16px;height:16px;border-radius:50%;
  font-size:9px;font-weight:800;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;margin-top:1px;background:var(--border)
}
.dp-finding{
  background:var(--bg);border-radius:6px;padding:10px 12px;
  font-size:12px;line-height:1.55;color:#94a3b8;font-style:italic
}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.mc{background:var(--bg);border-radius:5px;padding:8px 10px}
.mc-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}
.mc-val{font-size:14px;font-weight:700;color:var(--text)}
.next-box{
  background:var(--bg);border:1px solid var(--border);border-radius:7px;
  padding:10px 12px;font-size:12px;line-height:1.5;color:#e2e8f0
}
.next-box strong{
  display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted);margin-bottom:5px
}
.dp-divider{border:none;border-top:1px solid var(--border);margin:14px 0}

/* ── TOOLTIP ────────────────────────────────────────────────────────────── */
#tooltip{
  position:fixed;pointer-events:none;z-index:999;
  background:rgba(15,23,42,.97);border:1px solid #334155;border-radius:8px;
  padding:10px 14px;font-size:12px;max-width:260px;line-height:1.5;
  color:#e2e8f0;box-shadow:0 8px 32px rgba(0,0,0,.5);
  transition:opacity .12s;opacity:0
}
#tooltip.show{opacity:1}

/* ── SVG embedded styles ─────────────────────────────────────────────────── */
.lane-rect{rx:8}
.node-rect{rx:7;cursor:pointer;transition:filter .15s}
.node-rect:hover{filter:brightness(1.35) drop-shadow(0 0 6px currentColor)}
.node-rect.selected{filter:brightness(1.4) drop-shadow(0 0 10px currentColor)}
.connector{fill:none;stroke:#334155;stroke-width:1.2;
  stroke-dasharray:4 3;marker-end:url(#arr)}
.connector-solid{fill:none;stroke:#1e3a5f;stroke-width:1.5;
  marker-end:url(#arr2)}
.journal-node{cursor:pointer}
.journal-node:hover rect{filter:brightness(1.3)}
</style>
</head>

      'Author names, ORCIDs, institutional affiliations',
      'Add dpi=300 to all savefig() calls before submission',
      'If direction B: plan CDDP biomarker analysis pipeline',
    ],
    finding:'CMUH validates C15 national cohort (C-index 0.690 vs 0.670; sex/stage distributions match). DL no gain over Cox at n=334. Transfer learning fails (era + referral centre mismatch). SHAP: Age has non-linear U-shaped OS effect.',
  },
  {
    id:'esca', group:'external', status:'closed',
    title:'TCGA-ESCA TP53 Immune',
    sub:'TCGA · n=143 · CIBERSORT · CLOSED',
    journal:'Closed — no further work',
    metrics:[
      {l:'M2 FDR', v:'0.045 ✓ primary'},{l:'CD8 p', v:'0.189 null'},
      {l:'nu locked', v:'0.5'},{l:'Power deficit', v:'9.2× n_wt'},
    ],
    next:'None. M2 primary result stands; CD8 biological null confirmed.',
    pending:[],
    finding:'TP53 mut → M2 macrophage enrichment (FDR=0.045). CD8 null confirmed across 10 deconvolution methods (9.2× more WT patients needed for 80% power). ESCC ~100% TP53-mut collapses TP53 with histology.',
  },
];

// ═══════════════════════════════════════════════════════════════════════════
// LAYOUT CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const LANES = [
  { id:'epi',        label:'Registry — Epidemiology',    grad:'url(#lane-epi)',  y:54,  h:124 },
  { id:'dl_seq',     label:'Registry — DL  ·  Sequence', grad:'url(#lane-seq)', y:193, h:124 },
  { id:'dl_analysis',label:'Registry — DL  ·  Analysis', grad:'url(#lane-anal)',y:332, h:174 },
  { id:'external',   label:'External Cohorts',            grad:'url(#lane-ext)', y:521, h:124 },
];
const NODE_W = 178, NODE_H = 74;
const LANE_LABEL_W = 168;
const JOURNAL_X = 1390;
const JOURNAL_W = 155, JOURNAL_H = 36;
const SVG_W = 1560, SVG_H = 720;

// assign x positions per lane
const laneProjects = {};
LANES.forEach(l => { laneProjects[l.id] = PROJECTS.filter(p => p.group === l.id); });

function nodeX(laneId, idx) {
  const n = laneProjects[laneId].length;
  const totalW = LANE_LABEL_W + 16 + n * NODE_W + (n-1) * 14;
  const startX = LANE_LABEL_W + 20;
  return startX + idx * (NODE_W + 14);
}

function nodeY(laneId) {
  const lane = LANES.find(l => l.id === laneId);
  return lane.y + (lane.h - NODE_H) / 2;
}

function nodeCX(laneId, idx) { return nodeX(laneId, idx) + NODE_W / 2; }
function nodeCY(laneId)       { return nodeY(laneId) + NODE_H / 2; }

// collect journal targets
const journals = {};
PROJECTS.filter(p => p.status === 'ready').forEach(p => {
  if (!journals[p.journal]) {
    const laneY = LANES.find(l => l.id === p.group);
    journals[p.journal] = { name: p.journal, y: 0, groups: [] };
  }
  journals[p.journal].groups.push(p.group);
});

// Journal y positions
const journalList = [
  { name:'Cancers (MDPI)',           groups:['epi'],      y: 116 },
  { name:'Cancer Epidemiology',      groups:['epi'],      y: 162 },
  { name:'Breast Cancer Research',   groups:['external'], y: 583 },
];

// ═══════════════════════════════════════════════════════════════════════════
// SVG RENDERING
// ═══════════════════════════════════════════════════════════════════════════
const svg = document.getElementById('svg-main');

function el(tag, attrs, text) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs || {}).forEach(([k,v]) => e.setAttribute(k, v));
  if (text !== undefined) e.textContent = text;
  return e;
}

function drawLanes() {
  LANES.forEach(lane => {
    const g = el('g');
    g.appendChild(el('rect', {
      x:0, y:lane.y, width:SVG_W - 40, height:lane.h,
      fill:lane.grad, rx:8, opacity:.8
    }));
    // Lane label — vertical rotated text
    const t = el('text', {
      x: LANE_LABEL_W - 14,
      y: lane.y + lane.h / 2,
      fill:'#475569',
      'font-size':'10',
      'font-weight':'700',
      'text-anchor':'middle',
      'dominant-baseline':'middle',
      'text-transform':'uppercase',
      'letter-spacing':'1',
      transform:`rotate(-90, ${LANE_LABEL_W - 14}, ${lane.y + lane.h / 2})`
    }, lane.label.toUpperCase());
    g.appendChild(t);
    // vertical separator
    g.appendChild(el('line', {
      x1:LANE_LABEL_W, y1:lane.y+4, x2:LANE_LABEL_W, y2:lane.y+lane.h-4,
      stroke:'#1e3050', 'stroke-width':'1'
    }));
    svg.appendChild(g);
  });
}

function drawJournals() {
  journalList.forEach(j => {
    const g = el('g', { 'class':'journal-node', 'data-journal':j.name });
    g.appendChild(el('rect', {
      x:JOURNAL_X, y:j.y - JOURNAL_H/2,
      width:JOURNAL_W, height:JOURNAL_H,
      rx:6, fill:'#0c1e12', stroke:'#16a34a', 'stroke-width':'1.5'
    }));
    // Journal name (wrap)
    const lines = wrapText(j.name, 18);
    lines.forEach((line, i) => {
      g.appendChild(el('text', {
        x: JOURNAL_X + JOURNAL_W/2,
        y: j.y - (lines.length-1)*7 + i*14,
        'text-anchor':'middle',
        'dominant-baseline':'middle',
        fill:'#86efac',
        'font-size':'9.5',
        'font-weight':'600'
      }, line));
    });
    svg.appendChild(g);
  });
}

function wrapText(str, maxLen) {
  const words = str.split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    if ((cur + ' ' + w).trim().length > maxLen && cur) { lines.push(cur); cur = w; }
    else cur = (cur + ' ' + w).trim();
  });
  if (cur) lines.push(cur);
  return lines;
}

function drawConnections() {
  // Ready projects → journals
  PROJECTS.filter(p => p.status === 'ready').forEach(p => {
    const jConf = journalList.find(j => j.name === p.journal);
    if (!jConf) return;
    const laneIdx = laneProjects[p.group].findIndex(x => x.id === p.id);
    const x1 = nodeX(p.group, laneIdx) + NODE_W;
    const y1 = nodeY(p.group) + NODE_H/2;
    const x2 = JOURNAL_X;
    const y2 = jConf.y;
    const g = el('g');
    const path = el('path', {
      d:`M${x1},${y1} C${x1+60},${y1} ${x2-60},${y2} ${x2},${y2}`,
      fill:'none', stroke:'#16a34a', 'stroke-width':'1.2', opacity:'.45',
      'marker-end':'url(#arr-ready)'
    });
    g.appendChild(path);
    svg.insertBefore(g, svg.firstChild);
  });

  // Internal relationships (dashed)
  const rels = [
    ['surveillance','multihistory'],
    ['uadt','surveillance'],
    ['c15','cmuh'],
    ['hbv','temporal'],
    ['taxonomy','syndrome'],
  ];
  rels.forEach(([a, b]) => {
    const pa = PROJECTS.find(p => p.id === a);
    const pb = PROJECTS.find(p => p.id === b);
    if (!pa || !pb) return;
    const ia = laneProjects[pa.group].findIndex(p => p.id === a);
    const ib = laneProjects[pb.group].findIndex(p => p.id === b);
    const x1 = nodeCX(pa.group, ia), y1 = nodeCY(pa.group);
    const x2 = nodeCX(pb.group, ib), y2 = nodeCY(pb.group);
    // pick control points
    const mx = (x1+x2)/2, my = (y1+y2)/2;
    const g = el('g');
    const path = el('path', {
      d:`M${x1},${y1} Q${mx+30},${my} ${x2},${y2}`,
      fill:'none', stroke:'#2d4a6e', 'stroke-width':'1',
      'stroke-dasharray':'4 3', opacity:'.55'
    });
    g.appendChild(path);
    svg.insertBefore(g, svg.firstChild);
  });
}

function drawNodes() {
  PROJECTS.forEach(p => {
    const cfg = STATUS_CFG[p.status];
    const lane = LANES.find(l => l.id === p.group);
    const idx = laneProjects[p.group].findIndex(x => x.id === p.id);
    const x = nodeX(p.group, idx);
    const y = nodeY(p.group);
    const cx = x + NODE_W/2;
    const cy = y + NODE_H/2;

    const g = el('g', { 'class':'node', 'data-id':p.id, id:'node-'+p.id });

    // shadow/glow rect behind
    g.appendChild(el('rect', {
      x:x-2, y:y-2, width:NODE_W+4, height:NODE_H+4,
      rx:9, fill:cfg.stroke, opacity:'.12'
    }));

    // main rect
    const rect = el('rect', {
      x, y, width:NODE_W, height:NODE_H,
      rx:7, fill:cfg.fill,
      stroke:cfg.stroke, 'stroke-width':'1.4',
      'class':'node-rect'
    });
    g.appendChild(rect);

    // left accent bar
    g.appendChild(el('rect', {
      x, y:y+6, width:3, height:NODE_H-12,
      rx:2, fill:cfg.stroke, opacity:'.8'
    }));

    // title text
    const titleLines = wrapText(p.title, 20);
    titleLines.forEach((line, i) => {
      g.appendChild(el('text', {
        x:x+12, y:y+17+i*14,
        fill:cfg.text,
        'font-size':'11',
        'font-weight':'700',
        'dominant-baseline':'middle'
      }, line));
    });

    // subtitle
    g.appendChild(el('text', {
      x:x+12, y:y+NODE_H-24,
      fill:'#475569',
      'font-size':'9',
      'dominant-baseline':'middle'
    }, p.sub.length > 32 ? p.sub.substring(0,31)+'…' : p.sub));

    // status badge
    g.appendChild(el('rect', {
      x:x+8, y:y+NODE_H-15, width:56, height:11,
      rx:3, fill:cfg.badge_bg, opacity:'.9'
    }));
    g.appendChild(el('text', {
      x:x+36, y:y+NODE_H-9,
      fill:cfg.badge_txt,
      'font-size':'7.5',
      'font-weight':'800',
      'text-anchor':'middle',
      'dominant-baseline':'middle',
      'letter-spacing':'.5'
    }, p.status.toUpperCase()));

    // journal micro-badge on right
    const jShort = p.journal.length > 20 ? p.journal.substring(0,19)+'…' : p.journal;
    g.appendChild(el('text', {
      x:x+NODE_W-8, y:y+NODE_H-9,
      fill:'#374151',
      'font-size':'7.5',
      'text-anchor':'end',
      'dominant-baseline':'middle'
    }, jShort));

    // pending-count badge (top-right)
    if (p.pending.length > 0 && p.status !== 'closed') {
      g.appendChild(el('rect', {
        x:x+NODE_W-20, y:y+4, width:16, height:14,
        rx:7, fill:cfg.stroke, opacity:'.9'
      }));
      g.appendChild(el('text', {
        x:x+NODE_W-12, y:y+11,
        fill:cfg.fill, 'font-size':'8', 'font-weight':'800',
        'text-anchor':'middle', 'dominant-baseline':'middle'
      }, String(p.pending.length)));
    }

    svg.appendChild(g);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// STATUS CHIPS IN HEADER
// ═══════════════════════════════════════════════════════════════════════════
function drawChips() {
  const counts = {};
  PROJECTS.forEach(p => counts[p.status] = (counts[p.status]||0)+1);
  const chipsEl = document.getElementById('stat-chips');
  Object.entries(counts).forEach(([s, n]) => {
    const c = document.createElement('div');
    c.className = `chip chip-${s}`;
    c.textContent = `${STATUS_CFG[s].label}: ${n}`;
    chipsEl.appendChild(c);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════════════════════════════════════
let activeId = null;

function openDetail(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (!p) return;

  // remove previous selection
  document.querySelectorAll('.node-rect.selected').forEach(r => r.classList.remove('selected'));
  const node = document.getElementById('node-'+id);
  if (node) node.querySelector('.node-rect').classList.add('selected');

  activeId = id;
  const cfg = STATUS_CFG[p.status];

  let metricsHTML = `<div class="metrics-grid">` +
    p.metrics.map(m =>
      `<div class="mc"><div class="mc-label">${m.l}</div><div class="mc-val">${m.v}</div></div>`
    ).join('') + `</div>`;

  let pendingHTML = p.pending.length
    ? `<ul class="plist">${p.pending.map((t,i) =>
        `<li><span class="pnum">${i+1}</span><span>${t}</span></li>`
      ).join('')}</ul>`
    : `<p style="font-size:12px;color:#4b5563;font-style:italic">No pending items.</p>`;

  document.getElementById('dpanel-inner').innerHTML = `
    <span class="dp-close" id="detail-close">✕</span>
    <div class="dp-badge" style="background:${cfg.badge_bg};color:${cfg.badge_txt}">${STATUS_CFG[p.status].label}</div>
    <div class="dp-title">${p.title}</div>
    <div class="dp-sub">${p.sub}</div>

    <div class="dp-section">
      <div class="dp-slabel">Target Journal</div>
      <div class="dp-journal"><strong>→</strong>${p.journal}</div>
    </div>

    <div class="dp-section">
      <div class="dp-slabel">Next Action</div>
      <div class="next-box"><strong>⚡ Priority</strong>${p.next}</div>
    </div>

    ${p.pending.length ? `<div class="dp-section">
      <div class="dp-slabel">Pending (${p.pending.length})</div>
      ${pendingHTML}
    </div>` : ''}

    <div class="dp-section">
      <div class="dp-slabel">Key Metrics</div>
      ${metricsHTML}
    </div>

    <hr class="dp-divider">
    <div class="dp-section">
      <div class="dp-slabel">Key Finding</div>
      <div class="dp-finding">${p.finding}</div>
    </div>
  `;

  const panel = document.getElementById('dpanel');
  panel.classList.add('open');
  document.getElementById('detail-close').onclick = closeDetail;
}

function closeDetail() {
  document.getElementById('dpanel').classList.remove('open');
  document.querySelectorAll('.node-rect.selected').forEach(r => r.classList.remove('selected'));
  activeId = null;
}

// ═══════════════════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════════════════
const tip = document.getElementById('tooltip');

function showTip(p, evt) {
  tip.innerHTML = `<strong style="color:${STATUS_CFG[p.status].text}">${p.title}</strong>
    <br><span style="color:#64748b;font-size:11px">${p.sub}</span>
    <br><br><span style="color:#94a3b8;font-size:11px">⚡ ${p.next}</span>`;
  tip.classList.add('show');
  moveTip(evt);
}

function moveTip(evt) {
  const x = evt.clientX + 14, y = evt.clientY - 10;
  tip.style.left = Math.min(x, window.innerWidth - 280) + 'px';
  tip.style.top  = Math.max(y, 8) + 'px';
}

// ═══════════════════════════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════════════════════════
let activeFilter = 'all';

document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.f;
    PROJECTS.forEach(p => {
      const node = document.getElementById('node-'+p.id);
      if (!node) return;
      const show = activeFilter === 'all' || p.status === activeFilter;
      node.style.opacity = show ? '1' : '0.12';
      node.style.pointerEvents = show ? 'auto' : 'none';
    });
  });
});

// ═══════════════════════════════════════════════════════════════════════════
// NODE INTERACTION
// ═══════════════════════════════════════════════════════════════════════════
svg.addEventListener('click', evt => {
  const node = evt.target.closest('.node');
  if (!node) return;
  const id = node.dataset.id;
  if (id === activeId) { closeDetail(); return; }
  openDetail(id);
});

svg.addEventListener('mousemove', evt => {
  const node = evt.target.closest('.node');
  if (node) {
    const p = PROJECTS.find(x => x.id === node.dataset.id);
    if (p) { showTip(p, evt); return; }
  }
  tip.classList.remove('show');
  moveTip(evt);
});

svg.addEventListener('mouseleave', () => tip.classList.remove('show'));

// ═══════════════════════════════════════════════════════════════════════════
// LEGEND — bottom of SVG
// ═══════════════════════════════════════════════════════════════════════════
function drawLegend() {
  const y = 670;
  const g = el('g');
  let x = LANE_LABEL_W + 20;
  const entries = [
    ['ready','Ready to Submit'],
    ['issues','Open Issues'],
    ['rerun','Re-run Needed'],
    ['undecided','Decide Direction'],
    ['closed','Closed'],
  ];
  entries.forEach(([s, label]) => {
    const cfg = STATUS_CFG[s];
    g.appendChild(el('rect', { x, y:y-7, width:10, height:10, rx:2, fill:cfg.stroke }));
    g.appendChild(el('text', { x:x+14, y, fill:'#64748b', 'font-size':'10',
      'dominant-baseline':'middle' }, label));
    x += label.length * 6.2 + 28;
  });
  g.appendChild(el('text', { x: SVG_W - 60, y,
    fill:'#334155', 'font-size':'9', 'text-anchor':'end',
    'dominant-baseline':'middle' }, '● Click any node for details'));
  svg.appendChild(g);
}

// ═══════════════════════════════════════════════════════════════════════════
// SECTION DIVIDERS between lanes
// ═══════════════════════════════════════════════════════════════════════════
function drawDividers() {
  [LANES[0].y + LANES[0].h + 6, LANES[1].y + LANES[1].h + 6,
   LANES[2].y + LANES[2].h + 6].forEach(y => {
    svg.insertBefore(el('line', {
      x1:LANE_LABEL_W + 10, y1:y, x2:SVG_W - 50, y2:y,
      stroke:'#1a2a45', 'stroke-width':'.8'
    }), svg.firstChild);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// PHASE HEADER STRIP
// ═══════════════════════════════════════════════════════════════════════════
function drawPhaseHeader() {
  const g = el('g');
  const phases = [
    { label:'PROJECTS', x:LANE_LABEL_W+10, w:1050 },
    { label:'JOURNALS', x:JOURNAL_X - 10, w:JOURNAL_W + 20 },
  ];
  phases.forEach(ph => {
    g.appendChild(el('rect', { x:ph.x, y:8, width:ph.w, height:30,
      rx:5, fill:'#0d1a2e', opacity:'.8' }));
    g.appendChild(el('text', {
      x:ph.x + ph.w/2, y:23, fill:'#334155', 'font-size':'9.5',
      'font-weight':'800', 'text-anchor':'middle',
      'dominant-baseline':'middle', 'letter-spacing':'2'
    }, ph.label));
  });
  svg.insertBefore(g, svg.firstChild);
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
drawLanes();
drawDividers();
drawPhaseHeader();
drawConnections();
drawJournals();
drawNodes();
drawLegend();
drawChips();
</script>
